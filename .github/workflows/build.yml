name: Build X112 APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev build-essential

      - name: Install Python tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36 buildozer==1.5.0

      - name: Clean build
        run: |
          rm -rf .buildozer

     - name: Force rebuild p4a
      run: |
      rm -rf .buildozer/android/platform/python-for-android
       rm -rf ~/.buildozer/android/platform/python-for-android

 -  name: Clean build environment
    run: |
    rm -rf .buildozer
    rm -rf ~/.buildozer

      - name: Build APK
        run: |
          export DEBIAN_FRONTEND=noninteractive
          buildozer android clean
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: x112-apk
          path: bin/*.apk
